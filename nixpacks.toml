[phases.setup]
nixPkgs = [
    "php84",
    "php84Extensions.pdo",
    "php84Extensions.pdo_mysql",
    "php84Extensions.mbstring",
    "php84Extensions.tokenizer",
    "php84Extensions.xml",
    "php84Extensions.ctype",
    "php84Extensions.fileinfo",
    "php84Extensions.curl",
    "php84Extensions.zip",
    "php84Extensions.gd",
    "php84Extensions.openssl",
    "php84Extensions.redis",
    "composer",
    "nginx",
]

[phases.build]
cmds = [
    "composer install --optimize-autoloader --no-interaction --no-dev",
    "php artisan storage:link || true",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache",
]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --force || true && php-fpm84 -D && nginx -g 'daemon off;'"
