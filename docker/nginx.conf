server {
    listen 8080;
    server_name _;
    root /var/www/public;
    index index.php;

    # ── Serve static files directly (CSS, JS, images, fonts) ──────────────
    # This is what was BROKEN before — artisan serve never reached these files
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires max;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── All other requests → Laravel index.php ────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
    }

    # ── Block hidden files ────────────────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ── Logs to Docker stdout/stderr ──────────────────────────────────────
    access_log /dev/stdout;
    error_log  /dev/stderr warn;
}
